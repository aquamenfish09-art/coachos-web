<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoachOS</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #080b12;
      color: white;
    }

    .app-header {
      padding: 18px 16px;
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      color: #06131e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .app-title {
      font-size: 23px;
      font-weight: 900;
    }

    #languageSelect {
      width: auto;
      min-width: 130px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.4);
      background: #020617;
      color: white;
      font-weight: 800;
    }

    nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px;
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav button {
      border: 0;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      padding: 11px 13px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    nav button.active {
      background: #22c55e;
      color: #06131e;
    }

    section {
      display: none;
      padding: 15px;
      max-width: 1100px;
      margin: auto;
    }

    section.active { display: block; }

    .card {
      background: #111827;
      border: 1px solid #253044;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h2, h3 { margin-top: 0; }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      margin: 7px 0 13px;
      border-radius: 13px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      font-size: 15px;
    }

    textarea { min-height: 90px; }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      margin: 5px 0;
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      font-weight: 900;
      color: #06131e;
      font-size: 15px;
      cursor: pointer;
    }

    .btn.secondary {
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
    }

    .btn.danger {
      background: linear-gradient(135deg, #fb7185, #f59e0b);
      color: #111827;
    }

    .result {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.55;
      color: #dbeafe;
      overflow-wrap: break-word;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: #111827;
      border: 1px solid #253044;
      border-radius: 15px;
      padding: 14px;
    }

    .stat b {
      display: block;
      color: #22c55e;
      font-size: 22px;
      margin-top: 5px;
    }

    img.preview {
      max-width: 100%;
      border-radius: 14px;
      border: 1px solid #334155;
      display: none;
      margin: 8px 0 14px;
    }

    .small {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
    }

    .memory-item {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 15px;
      padding: 13px;
      margin-bottom: 12px;
    }

    .memory-item h3 {
      color: #22c55e;
      margin: 0 0 6px;
    }

    .analysis-shell {
      background: #020617;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .analysis-hero {
      background: radial-gradient(circle at top left, rgba(34,197,94,.28), transparent 35%),
                  linear-gradient(135deg, rgba(34,197,94,.18), rgba(56,189,248,.10));
      padding: 16px;
      border-bottom: 1px solid #334155;
    }

    .analysis-hero small {
      display: inline-block;
      color: #bbf7d0;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .analysis-hero h3 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
    }

    .analysis-hero p {
      color: #cbd5e1;
      margin: 8px 0 0;
      line-height: 1.45;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .metric-tile {
      background: #111827;
      border: 1px solid #253044;
      border-radius: 16px;
      padding: 13px;
      min-height: 92px;
    }

    .metric-tile .label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .metric-tile .value {
      color: #f8fafc;
      font-size: 20px;
      font-weight: 950;
      line-height: 1.15;
    }

    .metric-tile.calorie .value { color: #22c55e; }
    .metric-tile.protein .value { color: #38bdf8; }
    .metric-tile.carbs .value { color: #fbbf24; }
    .metric-tile.fat .value { color: #fb7185; }

    .insight-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .insight-card {
      background: #0f172a;
      border: 1px solid #253044;
      border-radius: 16px;
      padding: 13px;
    }

    .insight-card strong {
      display: block;
      color: #22c55e;
      margin-bottom: 6px;
    }

    .insight-card span {
      color: #dbeafe;
      line-height: 1.45;
    }

    .full-report {
      margin: 0 14px 14px;
      border-radius: 16px;
      background: #020617;
      border: 1px solid #253044;
      overflow: hidden;
    }

    .full-report summary {
      cursor: pointer;
      padding: 13px;
      font-weight: 900;
      color: #38bdf8;
    }
